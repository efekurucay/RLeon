name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (Debug)
        run: xcodebuild -scheme SwiftSpeechVisionDemo -configuration Debug -destination 'platform=macOS' build
